services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/sahyog.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - odoo
    restart: unless-stopped

  odoo:
    image: odoo:19.0
    ports:
      - "8069:8069"
    command: ["odoo", "--proxy-mode"]
    volumes:
      - odoo-filestore:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - ./sahyog:/mnt/extra-addons/sahyog:ro
      - ./muk_backend_theme/muk_web_theme:/mnt/extra-addons/muk_web_theme:ro
      - ./muk_backend_theme/muk_web_appsbar:/mnt/extra-addons/muk_web_appsbar:ro
      - ./muk_backend_theme/muk_web_chatter:/mnt/extra-addons/muk_web_chatter:ro
      - ./muk_backend_theme/muk_web_colors:/mnt/extra-addons/muk_web_colors:ro
      - ./muk_backend_theme/muk_web_dialog:/mnt/extra-addons/muk_web_dialog:ro
      - ./muk_backend_theme/muk_web_group:/mnt/extra-addons/muk_web_group:ro
      - ./muk_backend_theme/muk_web_refresh:/mnt/extra-addons/muk_web_refresh:ro
    environment:
      - SMTP_SERVER=${SMTP_SERVER:-smtp.resend.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-resend}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@sahyog.online}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  odoo-filestore:
  certbot-www:
