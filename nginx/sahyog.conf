upstream odoo {
    server odoo:8069;
}

# HTTP — serves Let's Encrypt challenges + redirects to HTTPS
server {
    listen 80;
    server_name isha.sahyog.online;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (once certs exist)
    location / {
        # During initial setup (no certs yet), proxy to Odoo on HTTP
        # After certs are obtained, uncomment the redirect below and comment out proxy_pass
        # return 301 https://$host$request_uri;
        proxy_pass http://odoo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /longpolling {
        proxy_pass http://odoo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 100m;

    gzip on;
    gzip_types text/css text/plain application/json application/javascript text/xml application/xml image/svg+xml;
}
