name: Deploy to GCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build SPA
        run: |
          cd sahyog/static/src/volunteer_app
          npm ci
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_KEY }}

      - name: Deploy to server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          # Git pull on server + copy built SPA + restart
          ssh $SERVER_USER@$SERVER_IP "sudo bash -c '
            cd /home/gauravrana/sahyog-odoo
            git pull origin main
            docker compose restart odoo
          '"

          # Copy the built SPA dist (not in git)
          rsync -avz --chmod=D755,F644 \
            sahyog/static/dist/ \
            $SERVER_USER@$SERVER_IP:/tmp/sahyog-dist/

          # Move built files into place with sudo
          ssh $SERVER_USER@$SERVER_IP "sudo bash -c '
            cp -r /tmp/sahyog-dist/* /home/gauravrana/sahyog-odoo/sahyog/static/dist/
            rm -rf /tmp/sahyog-dist
            cd /home/gauravrana/sahyog-odoo
            docker compose restart odoo
          '"
